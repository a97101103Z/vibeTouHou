<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vibeTouHou — Admin Panel</title>
    <meta
      name="description"
      content="Administration panel for vibeTouHou."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      /* Admin-specific overrides */
      .admin-body { background: #0a0a12; color: #e0e0e0; font-family: 'Share Tech Mono', monospace; }
      #admin-app { display: none; max-width: 1400px; margin: 0 auto; padding: 20px; }
      #admin-app.visible { display: block; }
      .admin-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid #333; }
      .admin-title { font-family: 'Orbitron', monospace; font-size: 1.2rem; color: #ff4444; }
      .admin-logout { background: none; border: 1px solid #555; color: #aaa; padding: 4px 12px; cursor: pointer; }
      .admin-logout:hover { border-color: #ff4444; color: #ff4444; }
      .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
      @media (max-width: 900px) { .overview-grid { grid-template-columns: 1fr; } }
      .card { background: #12121e; border: 1px solid #2a2a3a; border-radius: 8px; padding: 16px; }
      .card h3 { margin: 0 0 12px 0; font-family: 'Orbitron', monospace; font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
      .phase-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
      .phase-code { background: #1a3a1a; color: #4f4; }
      .phase-gauntlet { background: #3a1a1a; color: #f44; }
      .phase-control-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
      .phase-control-row select, .phase-control-row input { background: #1a1a2a; border: 1px solid #333; color: #e0e0e0; padding: 4px 8px; font-family: 'Share Tech Mono', monospace; }
      .btn-admin { background: #2a2a4a; border: 1px solid #444; color: #e0e0e0; padding: 6px 16px; cursor: pointer; font-family: 'Share Tech Mono', monospace; }
      .btn-admin:hover { background: #3a3a5a; border-color: #ff4444; }
      .btn-admin.danger { border-color: #662; }
      .btn-admin.danger:hover { background: #3a1a1a; border-color: #f44; }
      .btn-admin.primary { border-color: #448; }
      .btn-admin.primary:hover { background: #1a1a3a; border-color: #44f; }
      .slots-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
      .slots-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid #333; color: #888; font-weight: normal; text-transform: uppercase; letter-spacing: 0.5px; }
      .slots-table td { padding: 6px 8px; border-bottom: 1px solid #1a1a2a; }
      .slots-table tr:hover td { background: #16162a; }
      .slot-team-red { border-left: 3px solid #f44; }
      .slot-team-blue { border-left: 3px solid #44f; }
      .slot-unclaimed { opacity: 0.5; }
      .online-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
      .online-dot.online { background: #4f4; box-shadow: 0 0 6px #4f4; }
      .online-dot.offline { background: #555; }
      .status-yes { color: #4f4; }
      .status-no { color: #555; }
      .gallery-list-admin { display: flex; flex-direction: column; gap: 6px; }
      .gallery-entry-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; background: #0e0e1a; border-radius: 4px; }
      .gallery-entry-row .title { font-weight: bold; }
      .gallery-entry-row .hits { color: #888; margin-left: 12px; }
      #video-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
      #video-modal.visible { display: flex; }
      #video-modal video { max-width: 90vw; max-height: 85vh; border-radius: 8px; }
      #video-modal .modal-close { position: absolute; top: 20px; right: 30px; font-size: 2rem; color: #fff; cursor: pointer; background: none; border: none; }
      .add-gallery-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 12px; padding: 12px; background: #0e0e1a; border-radius: 4px; }
      .add-gallery-form input { background: #1a1a2a; border: 1px solid #333; color: #e0e0e0; padding: 4px 8px; font-family: 'Share Tech Mono', monospace; width: 100px; }
    </style>
  </head>
  <body class="admin-body">
    <!-- Login Overlay -->
    <div id="login-overlay">
      <div class="login-card">
        <div class="login-logo">
          <span class="logo-vibe">vibe</span><span class="logo-tou">Tou</span
          ><span class="logo-hou">Hou</span>
          <div class="logo-sub">Admin Panel</div>
        </div>
        <p class="login-tagline">Enter the admin token to access the control panel.</p>
        <div class="token-input-section">
          <input
            id="admin-token-input"
            type="password"
            class="token-input"
            placeholder="Admin token"
            aria-label="Admin token"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="btn-admin-login" class="claim-btn">Access Panel</button>
        </div>
        <p id="admin-login-error" style="color: #f44; display: none; margin-top: 12px;"></p>
      </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-app">
      <nav class="admin-nav">
        <div class="admin-title">vibeTouHou / ADMIN</div>
        <button id="btn-admin-logout" class="admin-logout">Logout</button>
      </nav>

      <!-- Overview Cards -->
      <div class="overview-grid">
        <div class="card" id="phase-card">
          <h3>Phase Control</h3>
          <div id="phase-display"></div>
          <div class="phase-control-row">
            <select id="phase-select">
              <option value="code">Code</option>
              <option value="gauntlet">Gauntlet</option>
            </select>
            <label>
              Grace (s):
              <input id="grace-seconds" type="number" value="60" min="0" max="600" style="width: 60px" />
            </label>
            <button id="btn-set-phase" class="btn-admin primary">Apply</button>
          </div>
        </div>

        <div class="card">
          <h3>Stats</h3>
          <div id="stats-display">Loading...</div>
        </div>
      </div>

      <!-- Slots Table -->
      <div class="card" style="margin-bottom: 24px;">
        <h3>Slots</h3>
        <div style="overflow-x: auto;">
          <table class="slots-table" id="slots-table">
            <thead>
              <tr>
                <th>Slot</th>
                <th>Status</th>
                <th>Online</th>
                <th>Last Seen</th>
                <th>Assets</th>
                <th>Output</th>
                <th>Published</th>
                <th>Score</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="slots-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Gallery Management -->
      <div class="card">
        <h3>Gallery</h3>
        <div id="gallery-admin-list" class="gallery-list-admin"></div>
      </div>
    </div>

    <!-- Video Modal -->
    <div id="video-modal">
      <button class="modal-close" id="video-modal-close">&times;</button>
      <video id="admin-video-player" controls autoplay></video>
    </div>

    <script type="module" src="/src/admin/main.js"></script>
  </body>
</html>
