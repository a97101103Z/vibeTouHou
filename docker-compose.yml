services:
  api:
    build:
      context: .
      dockerfile: ./deploy/Dockerfile
      args:
        ROOT_PATH: "${ROOT_PATH:-}"
    environment:
      MAX_RENDER_WORKERS: "12"
      MAX_RENDER_QUEUE: "48"
      # Absolute host path to ./data so sandbox containers (spawned as
      # Docker siblings via /var/run/docker.sock) can bind-mount it.
      # Override with an explicit path if ${PWD} doesn't resolve correctly.
      HOST_DATA_DIR: "${PWD}/data"
      RED_TEAM_TOKEN: "${RED_TEAM_TOKEN}"
      BLUE_TEAM_TOKEN: "${BLUE_TEAM_TOKEN}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
    volumes:
      - ./data:/app/data
      - ./pattern_examples:/app/pattern_examples
      - ./gallery:/app/gallery
      - ./showcase:/app/showcase
      - ${XDG_RUNTIME_DIR}/docker.sock:/var/run/docker.sock
    ports:
      - "12345:8000"
    restart: unless-stopped
